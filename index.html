        .premium-card {

        .icon-circle {

            width: 85px;
            height: 85px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -80px auto 20px auto;
            box-shadow: 0 10px 25px rgba(246, 173, 85, 0.5);

        .icon-circle i { font-size: 40px; color: #111; }

        .premium-card p { font-size: 15px; color: #cbd5e0; line-height: 1.6; margin-bottom: 25px; }

        .step-box {
            background: rgba(0,0,0,0.5);
            border: 1px dashed #f6ad55;
            padding: 15px;
            border-radius: 12px;
            margin: 30px 0;
        }
        
        .step-title {
            color: #f6ad55;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .scroll-hint {
            color: #63b3ed;
            font-size: 15px;
            margin: 30px 0;
            font-weight: bold;
            animation: bounce 2s infinite;
            background: rgba(49, 130, 206, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(10px); }
            60% { transform: translateY(5px); }
        }

        .telegram-btn {
            background: linear-gradient(to right, #0088cc, #0077b3);
            color: #fff;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;

            margin: 40px 0 15px 0;

            margin: 0 0 20px 0;
            position: relative;
            z-index: 10;

        }

            .hide-on-desktop { display: none !important; }
        }
